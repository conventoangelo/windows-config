# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

version: 4
upgrade:
  notice: true
  auto: true
final_space: true

console_title_template: "{{.Shell}} in {{.PWD}}"

secondary_prompt:
  template: "❯❯ "
  foreground: lightGreen
  background: transparent

transient_prompt:
  template: "❯ "
  background: transparent
  foreground_templates:
    - "{{if gt .Code 0}}red{{end}}"
    - "{{if eq .Code 0}}lightGreen{{end}}"

blocks:
  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: path
        style: plain
        foreground: magenta
        background: transparent
        template: "{{ .Path }}"
        options:
          folder_separator_icon: "/"
          home_icon: "~"
          max_depth: 2
          style: full

      - type: git
        style: plain
        foreground: lightGreen
        background: transparent
        template: " {{ .UpstreamIcon }} {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Staging.Changed }} \uf046 {{ .Staging.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Working.Changed }} \uf044 {{ .Working.String }}{{ end }}{{ if gt .StashCount 0 }} \ueb4b {{ .StashCount }}{{ end }} "
        foreground_templates:
          - "{{ if and (gt .Ahead 0) (gt .Behind 0) }}red{{ end }}"
          - "{{ if gt .Ahead 0 }}yellow{{ end }}"
          - "{{ if gt .Behind 0 }}blue{{ end }}"
          - "{{ if or (.Working.Changed) (.Staging.Changed) }}lightYellow{{ end }}"
        options:
          fetch_status: true
          fetch_upstream_icon: true

      - type: text
        style: plain
        foreground: yellow
        background: transparent
        template: " {{if .Root}}root{{else}}{{end}}"

  - type: rprompt
    overflow: hidden
    segments:
      - type: status
        style: plain
        background: transparent
        template: " {{ if gt .Code 0 }}\uf52f{{ else }}\uf49e{{ end }}"
        foreground_templates:
          - "{{ if gt .Code 0 }}lightRed{{ else }}lightGreen{{ end }}"
        options:
          always_enabled: true

      - type: executiontime
        style: plain
        foreground: yellow
        background: transparent
        template: " {{ .FormattedMs }} "
        options:
          always_enabled: false
          threshold: 2000
          style: austin

  - type: prompt
    alignment: left
    newline: true
    segments:
      - type: text
        style: plain
        background: transparent
        template: "❯"
        foreground_templates:
          - "{{if gt .Code 0}}red{{end}}"
          - "{{if eq .Code 0}}lightGreen{{end}}"
